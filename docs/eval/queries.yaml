  - id: Q20
    category: definitions
    query: "감사위험(audit risk) 이란 무엇인가?"
    expected_primary_chunks:
      - "200:13.(c)"   # logical_path: ¶13 용어의 정의 (c) 감사위험
    expected_related_chunks:
      - "200:13"
      - "200:17"       # 감사위험을 수용가능한 낮은 수준으로 감소 (본문 명시)
      - "200:A35"      # 감사위험 = RMM × 적발위험 (설명)
      - "200:13.(e)"   # 적발위험 (정의 짝)
      - "200:13.(n)"   # 중요왜곡표시위험 (정의 짝)
    notes: |
      Definitions 는 top-1 정확도가 핵심. Self-audit 2026-04-19: chunks.jsonl
      에 `200:(c)` chunk_id 가 중복 저장(용어의 정의/적용지침 양쪽). DB upsert
      last-write-wins 시 "감사위험 – 재무제표가 중요하게..." 정의 청크가
      실종될 위험이 있으므로, 200:17/200:A35 를 related 에 추가해 감사위험
      본문 fallback 보장. harness 측 positional resolver 는 heading_trail 에
      "용어의 정의" 포함 필터 적용해야 함 (README §3.2 참조).

