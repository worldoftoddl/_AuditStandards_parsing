      - "200:17"       # ISA 200 전체 목표상의 충분성·적합성
    notes: |
      v2 rev (2026-04-19): intro-parent 공백 교정.

      Evidence (chunks.jsonl 원문):
        * 500:5(=500:04342:5) section=definitions 본문 전체: "감사기준에서
          사용하는 용어의 정의는 다음과 같다." (stub. 감사증거 정의 없음.)
        * 500:5.(c)(=500:04345:(c)) 본문: "감사증거 - 감사인이 감사의견의
          근거가 되는 결론에 도달할 때 이용한 정보. 감사증거는 재무제표의
          기초가 되는 회계기록에 포함되어 있는 정보와 다른 원천에서 입수한
          정보를 모두 포함한다." ← **감사증거 authoritative 정의**
        * 500:5.(b)(=500:04344:(b)) 본문: "(감사증거의) 적합성 - 감사증거의
          질적 척도. 즉 감사의견의 근거가 되는 결론을 뒷받침하는 데 있어
          감사증거의 관련성과 신뢰성" ← **적합성 정의**
        * 500:5.(f)(=500:04348:(f)) 본문: "(감사증거의) 충분성 - 감사증거의
          양적 척도. 필요한 감사증거의 양은 감사인의 중요왜곡표시위험에 대한
          평가와 감사증거의 질에 영향을 받는다." ← **충분성 정의**
      → 쿼리가 요구하는 세 개념(정의·충분성·적합성)이 각각 (c)/(f)/(b)
