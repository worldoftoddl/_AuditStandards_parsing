      - "200:13.(e)"   # 적발위험 정의
      - "200:13.(n)"   # RMM (고유위험·통제위험 내부 설명 포함) 정의
    expected_related_chunks:
      - "200:13"       # 용어의 정의 parent (intro)
      - "315:23"       # 고유·통제 위험 식별·평가
      - "330:7"        # 적발위험에 대응한 실증절차
      - "330:18"       # 실증절차
    notes: |
      v2 rev (2026-04-19): intro-parent 공백 교정.

      Evidence — ISA 200 ¶13 용어의 정의 분포 (chunks.jsonl 실측):
        * 200:13 본문: "감사기준에서 사용하는 용어의 정의는 다음과 같다."
          (stub. 감사위험 모델 정의 없음.)
        * 200:13.(c) 본문: "감사위험 – 재무제표가 중요하게 왜곡표시되어
          있을 경우에 감사인이 부적합한 감사의견을 표명할 위험. 감사위험은
          중요왜곡표시위험과 적발위험의 함수이다." ← **감사위험 정의**
        * 200:13.(e) 본문: "적발위험 – 감사위험을 수용가능한 낮은 수준으로
          감소시키기 위해 감사인이 수행한 절차가 …을 발견해내지 못할 위험"
          ← **적발위험 정의**
        * 200:13.(n) 본문: "중요왜곡표시위험 – … 고유위험 – 모든 관련
          통제를 고려하기 전에 … 통제위험 – …"
          ← **고유위험·통제위험 정의가 (n) 서브아이템 내부에 포함**.
          KICPA 번역본은 두 위험을 RMM 설명의 subcategory 로 기술 (ISA 영문
          원본도 동일 구조).
      → v1 primary `200:13` 단독 지정은 stub. v2 는 세 위험 정의가 존재하는
      (c)·(e)·(n) 서브 3개로 교체. 200:13 은 related 로 강등. (m)은 '합리적
      확신' 정의로 질의 무관하여 제외.

