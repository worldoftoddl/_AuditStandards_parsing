  - id: Q24
    category: definitions
    query: "부정(fraud) 과 오류(error) 의 구분은?"
    expected_primary_chunks:
      - "240:12.(a)"   # 부정 정의 (의도성 기준)
      - "240:2"        # 부정과 오류를 구별하는 요인 직접 기술
    expected_related_chunks:
      - "240:12"       # 용어의 정의 parent (intro)
      - "240:12.(b)"   # 부정위험요소 정의
      - "240:3"        # 부정 법률적 개념
    notes: |
      v2 rev (2026-04-19): gold 라벨 정정. v1 primary [240:11, 240:12] 는
      둘 다 "다음과 같다." intro stub 이었음.

      Evidence (chunks.jsonl 원문):
        * 240:11(=240:01071:11) section=objective 본문 전체: "이 감사기준서와
          관련된 감사인의 목적은 다음과 같다." (stub, 9자.)
        * 240:12(=240:01076:12) section=definitions 본문 전체: "감사기준에서
          사용하는 용어의 정의는 다음과 같다." (stub, 9자.)
          → 두 v1 primary 모두 embedding 신호 부재.
        * 240:12.(a)(=240:01077:(a)) section=definitions 본문: "부정 -
          경영진, 지배기구, 종업원 또는 제3자 중 1인 이상이 부당하거나
          불법적인 이득을 취하기 위해 **기만행위가 연루된 의도적 행위**"
          ← **부정의 authoritative 정의. '의도적' 키워드로 오류와 구분.**
        * 240:2(=240:01054:2) section=intro 본문: "재무제표의 왜곡표시는
          부정이나 오류에 의해 발생될 수 있다. **부정과 오류를 구별하는 요인**
          은 재무제표의 왜곡표시가 의도적인가 비의도적인가에 있다."
          ← **쿼리의 '구분'을 가장 정면으로 답하는 서론 문단.**
        * (참고) 200:(i) "왜곡표시 정의" 는 related 에서 제외. 이유: ISA 200
          ¶13 아래에는 alphabetical `(i) 왜곡표시` 와 Roman numeral `(i)` (해당
          재무보고체계의 sub-sub) 가 동일 토큰으로 공존. positional resolver 가
          logical path `200:13.(i)` 를 Roman `(i)` 로 잘못 해석할 리스크 있음.
          필요 시 v3 에서 resolver 규약 확장 후 재추가.
      → v2 primary 는 240:12.(a)(부정 정의) + 240:2(부정-오류 구분 명시)
      로 교체. 4-way eval 에서 두 모델 모두 240:(a) 를 top-1 으로 회수한
      사실이 v2 gold 의 유효성을 반증 불가하게 지지.

