# KICPA 감사기준(ISA) 검색 평가용 쿼리 세트
# -------------------------------------------------
# - 카테고리: requirements / application / cross-standard / definitions
# - chunk_id 포맷: "{isa_no}:{paragraph_id}"  (예: "200:13", "315:(l)")
# - sub-item((a),(b),(i) 등)은 ISA 내에서 재등장하므로, 본 파일에서는
#   "logical_path" (예: "315:12.(l)") 로 병기하고, 평가 하네스에서
#   바로 앞의 parent paragraph(top-level 숫자 id) 다음 첫 매치로 해석함.
#   README.md 의 "chunk_id 해석 규약" 섹션 참조.
# - expected_primary_chunks: top-1/top-3 에 반드시 들어와야 하는 정답 chunk
# - expected_related_chunks: top-10 에 들어오면 가산(보조 맥락). 누락해도 recall 감점 없음.
# -------------------------------------------------
# v2 rev (2026-04-19) — DE gold correction
# -------------------------------------------------
# 근거 문서: docs/eval/phase3_failure_analysis.md §5
# 수정 5건 (Q10, Q14, Q16, Q24, Q25): gold 라벨 오류 2건 + intro-parent 공백 3건
# Phase 2 스냅샷(v1) eval 결과는 .work/eval_{bge_on,bge_off,upstage_on}.json 에 보존.
#
# Reverse audit (조건 B) — gold 관대 우연 매칭 탐색 결과:
#   대상: v1 의 26 queries × 총 43 primary chunks 전수.
#   방법: 각 primary 를 chunks.jsonl 에서 해석(resolver 포함) → 실제 본문을
#     질의 의도와 수작업 대조. 판정 (i) 정확매칭 / (ii) 프레이밍 미스매치
#     (엄격 gold) / (iii) 관대 overmatch / (iv) v2 이미 수정.
#   결과: (iii) 관대 overmatch = **0건**. (i) 정확매칭 18 queries (31 primary),
#     (ii) 프레이밍 미스매치 3 queries (Q11 전체·Q18 전체·Q19 의 240:32 축)
#     — Phase 3+ workshop 으로 deferred, (iv) v2 수정 대상 5 queries (Q10/Q14/
#     Q16/Q24/Q25). (ii) 케이스는 실측 recall@5=0.0 으로 모델이 맞추지 못함 →
#     "우연 맞춤" 성립 안 함. v2 는 false negative 제거 방향에만 작동, false
#     positive 없음. 전수 기록 → docs/eval/phase3_failure_analysis.md §8.
# -------------------------------------------------

