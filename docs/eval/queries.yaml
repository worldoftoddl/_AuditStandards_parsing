      - "330:6"
      - "330:18"
    notes: |
      v2 rev (2026-04-19): intro-parent 공백 교정.

      Evidence (chunks.jsonl 원문):
        * 200:13(=200:00050:13) 본문 전체: "감사기준에서 사용하는 용어의
          정의는 다음과 같다." (본문 9자. 실제 RMM 정의 없음, stub.)
        * 200:13.(n)(=200:00079:(n)) 본문: "중요왜곡표시위험 – 감사의
          착수 이전에 재무제표가 중요하게 왜곡표시 되어 있을 위험. 이것은
          경영진주장의 수준에서 다음과 같이 두 가지 구성요소로 설명된다.
          (문단 A16 참조) 고유위험 – … 통제위험 – …"
          ← **RMM 정의 본문은 (n) 서브아이템에 존재**.
      → v1 primary `200:13` 는 embedding 신호가 실질 0 (intro stub).
      v2 에서는 정의 본문이 실제 존재하는 (n) 으로 교체. 200:13 은
      related 로 강등해 heading_trail 이 포함될 경우 맥락 가산은 유지.
      315:23(식별)·330:5(대응) 은 v1 유지 — 본문 있음 확인.

